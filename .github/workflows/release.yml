name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 0.0.1. Leave empty to use version.properties.'
        required: false
        type: string
      bump:
        description: 'Version bump when version is empty.'
        required: true
        default: none
        type: choice
        options:
          - none
          - patch
          - minor
          - major
      draft:
        description: 'Create the GitHub Release as a draft.'
        required: true
        default: false
        type: boolean
      prerelease:
        description: 'Mark the GitHub Release as a prerelease.'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8

jobs:
  release:
    name: Build APK and publish release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate Gradle wrapper with local distribution
        run: gradle wrapper --gradle-version 8.13

      - name: Resolve release version
        id: version
        run: ./scripts/resolve-release-version.sh --bump "${{ inputs.bump }}" --version "${{ inputs.version }}" --write-env "$GITHUB_OUTPUT"

      - name: Ensure release tag does not exist
        run: |
          set -euo pipefail
          git fetch --tags origin
          if git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists locally." >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists on origin." >&2
            exit 1
          fi

      - name: Build release APK
        run: ./gradlew --no-daemon --max-workers=2 :assembly:assembleCompleteNormalRelease

      - name: Prepare release assets
        id: assets
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          APK_IN="assembly/build/outputs/apk/completeNormal/release/assembly-complete-normal-release.apk"
          APK_OUT="PrismSpace-v${VERSION}.apk"
          SHA_OUT="${APK_OUT}.sha256"
          cp "$APK_IN" "$APK_OUT"
          sha256sum "$APK_OUT" > "$SHA_OUT"
          {
            echo "apk=$APK_OUT"
            echo "sha=$SHA_OUT"
          } >> "$GITHUB_OUTPUT"

      - name: Configure release git identity
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Commit version update
        if: steps.version.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git add version.properties
          git commit -m "chore: release ${{ steps.version.outputs.tag }}"

      - name: Push release commit and tag
        run: |
          set -euo pipefail
          git tag -a "${{ steps.version.outputs.tag }}" -m "PrismSpace ${{ steps.version.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        run: |
          set -euo pipefail
          args=(
            release create "${{ steps.version.outputs.tag }}"
            "${{ steps.assets.outputs.apk }}"
            "${{ steps.assets.outputs.sha }}"
            --title "PrismSpace ${{ steps.version.outputs.tag }}"
            --generate-notes
          )
          if [[ "${{ inputs.draft }}" == "true" ]]; then args+=(--draft); fi
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then args+=(--prerelease); fi
          gh "${args[@]}"
        env:
          GH_TOKEN: ${{ github.token }}